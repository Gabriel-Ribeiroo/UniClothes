<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="./css/style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
	<script defer src="./js/script.js"></script>
	<title>Ecommerce</title>
</head>
<body>
	<header id="header">
		<h1>UniClothes</h1>

		<div class="header__actions-container">
			<button class="icon-button header__sidebar-open" aria-label="Abrir Menu" data-js="sidebar-open">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu-icon lucide-menu">
					<path d="M4 5h16" />
					<path d="M4 12h16" />
					<path d="M4 19h16" />
				</svg>
			</button>
			
			<button class="icon-button" aria-label="Mudar tema" data-js="theme-toggler">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun-moon-icon lucide-sun-moon">
					<path d="M12 2v2" />
					<path d="M14.837 16.385a6 6 0 1 1-7.223-7.222c.624-.147.97.66.715 1.248a4 4 0 0 0 5.26 5.259c.589-.255 1.396.09 1.248.715" />
					<path d="M16 12a4 4 0 0 0-4-4" />
					<path d="m19 5-1.256 1.256" />
					<path d="M20 12h2" />
				</svg>
			</button>
		</div>
	</header>

	<div class="layout">
		<aside id="sidebar" class="hidden" data-js="sidebar">	
			<div class="sidebar__container">
				<ul class="sidebar__categories-list">
					<li>Camisetas</li>
					<li>Blusas</li>
					<li>Calças</li>
					<li>Tênis</li>
				</ul>
	
				<button aria-label="Fechar Menu" data-js="sidebar-close" class="icon-button">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x">
						<path d="M18 6 6 18" />
						<path d="m6 6 12 12" />
					</svg>
				</button>
			</div>
	
			<div class="sidebar__overlay" aria-hidden="true" data-js="sidebar-close"></div>
		</aside>

		<main></main>
	</div>

	<footer id="footer">
		<p>Desenvolvido por: Gabriel Ribeiro, RA: 2507390</p>
	</footer>
</body>
</html>
